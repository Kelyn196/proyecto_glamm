<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glamm - Tienda de Ropa</title>
  <link rel="stylesheet" href="styles/main.less">
</head>

<body>
  {{>header}}

  {{>hero}}

  <section id="coleccion" class="coleccion">
    <div class="container">
      <h2>Nueva Colección</h2>

      <div class="grid">
        <div class="card">
          <img src="https://picsum.photos/id/24/1024/720" alt="Descuento vestidos">
          <h3>Descuento 20%</h3>
          <p>En vestidos elegantes</p>
        </div>

        <div class="card">
          <img src="https://picsum.photos/id/24/1024/720" alt="2x1 blusas">
          <h3>2x1</h3>
          <p>En blusas seleccionadas</p>
        </div>

        <div class="card">
          <img src="https://picsum.photos/id/24/1024/720" alt="Zapatos oferta">
          <h3>Oferta Especial</h3>
          <p>Zapatos desde L. 700</p>
        </div>
      </div>

    </div>
  </section>

  <footer class="footer">
    <p>© 2026 Glamm - Todos los derechos reservados</p>
  </footer>

</body>

</html>
